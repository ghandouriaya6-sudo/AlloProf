<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utilisateurs — AlloProf Admin</title>
<link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>

<div class="admin-layout">
  <div id="sidebar-root"></div>

  <div class="admin-main">
    <div id="topbar-root"></div>

    <div class="admin-content">

      <div class="panel">
        <div class="panel__header">
          <div class="panel__title">Gestion des utilisateurs</div>
          <div class="topbar__search" style="min-width:260px;">
            🔍 <input type="text" id="searchUser" placeholder="Rechercher un utilisateur…">
          </div>
        </div>

        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
  <th>Nom</th>
  <th>Email</th>
  <th>Téléphone</th>
  <th>Région</th>
  <th>Ville</th>
  <th>Niveau</th>
  <th>Rôle</th>
  <th>Statut</th>
  <th></th>
</tr>
            </thead>
            <tbody id="usersTableBody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Modal : Confirmation de suppression -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal" style="max-width:400px;">
    <div class="modal__body">
      <div class="confirm-box">
        <div class="icon">🗑️</div>
        <p id="confirm-message">Confirmer la suppression ?</p>
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn btn-secondary" id="confirm-no">Annuler</button>
      <button class="btn btn-danger" id="confirm-yes">Supprimer</button>
    </div>
  </div>
</div>

<script type="module" src="../assets/js/admin-users.js"></script>
</body>
</html>
