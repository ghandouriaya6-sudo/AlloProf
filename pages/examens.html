<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Examens — AlloProf</title>
<link rel="stylesheet" href="../assets/css/variables.css">
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="stylesheet" href="../assets/css/components.css">
<style>
  .question-card { background:var(--surface,#fff); border:1px solid var(--border,#e5e7eb); border-radius:var(--radius-lg,12px); padding:20px; margin-bottom:16px; }
  .question-card h4 { margin-bottom:12px; }
  .option-item { display:block; width:100%; text-align:left; padding:12px 16px; margin-bottom:8px; border:1px solid var(--border,#e5e7eb); border-radius:10px; background:#fff; cursor:pointer; transition:all .15s ease; }
  .option-item:hover { border-color:var(--blue,#2563eb); }
  .option-item.selected { border-color:var(--blue,#2563eb); background:#EFF6FF; }
  .option-item.correct { border-color:#16a34a; background:#DCFCE7; }
  .option-item.incorrect { border-color:#dc2626; background:#FEE2E2; }
  .option-item[disabled] { cursor:default; }
  .explanation { font-size:.85rem; color:var(--gray,#6b7280); margin-top:8px; padding:10px 12px; background:#F9FAFB; border-radius:8px; }
  .quiz-score { text-align:center; padding:24px; }
  .quiz-score .big { font-size:2.4rem; font-weight:800; color:var(--blue,#2563eb); }
</style>
</head>
<body>
<div id="navbar-mount"></div>

<main class="container section">
  <h1 class="section-title">Examens</h1>
  <p class="section-subtitle">Télécharge des examens blancs en PDF et teste-toi avec le quiz associé.</p>

  <div class="filters-bar" id="filtersBar">
    <select id="filterNiveau" aria-label="Niveau"><option value="">Tous les niveaux</option></select>
    <select id="filterMatiere" aria-label="Matière"><option value="">Toutes les matières</option></select>
  </div>

  <div id="loader" class="loader"></div>
  <div class="grid grid-3" id="examensList" style="margin-bottom:48px;display:none;"></div>
  <div class="empty-state" id="emptyState" style="display:none;">Aucun examen ne correspond à ce filtre.</div>

  <!-- Zone de quiz -->
  <div id="quizArea" style="display:none;">
    <button class="btn btn-secondary btn-sm" id="btn-back-to-list" style="margin-bottom:20px;">← Retour à la liste</button>
    <h2 id="quizTitle" style="margin-bottom:20px;"></h2>
    <div id="quizQuestions"></div>
    <button class="btn btn-primary" id="btn-correct-quiz" style="margin-top:8px;">Corriger</button>
    <div id="quizResult" style="display:none;"></div>
  </div>
</main>

<div id="footer-mount"></div>

<script src="../data/data.js"></script>
<script type="module" src="../assets/js/app.js"></script>
<script type="module">
import { onAuthReady, showToast, niveauNom, matiereNom } from "../assets/js/app.js";
import { getExamensLib } from "../assets/js/firestore.js";

let allExamens = [];
let currentQuizItem = null;
let currentAnswers = {};

function getFilteredExamens() {
  const niveau  = document.getElementById("filterNiveau").value;
  const matiere = document.getElementById("filterMatiere").value;
  return allExamens.filter(e => {
    if (niveau  && e.niveau  !== niveau)  return false;
    if (matiere && e.matiere !== matiere) return false;
    return true;
  });
}

function renderExamensList() {
  const grid  = document.getElementById("examensList");
  const empty = document.getElementById("emptyState");
  const filtered = getFilteredExamens();

  if (!allExamens.length) {
    grid.innerHTML = `<p class="empty-state" style="grid-column:1/-1">Aucun examen disponible pour le moment.</p>`;
    empty.style.display = "none";
    return;
  }
  if (!filtered.length) {
    grid.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  grid.innerHTML = filtered.map(e => `
    <div class="card card-body">
      <div class="card-meta">
        <span class="badge badge-level">${niveauNom(e.niveau)}</span>
        <span class="badge badge-level">${matiereNom(e.matiere)}</span>
        ${e.premium ? '<span class="badge badge-premium">⭐ Premium</span>' : '<span class="badge badge-free">Gratuit</span>'}
      </div>
      <h3 class="card-title">${e.titre || "Sans titre"}</h3>
      <p class="card-desc">${e.description || ""}</p>
      <button class="btn btn-primary btn-block" data-download="${e.id}" style="margin-bottom:8px;">📄 Télécharger le PDF</button>
      ${e.correction ? `<button class="btn btn-secondary btn-block" data-correction="${e.id}" style="margin-bottom:8px;">📖 Voir le corrigé</button>` : ""}
      ${e.questions?.length ? `<button class="btn btn-secondary btn-block" data-quiz="${e.id}">🎯 Faire le quiz (${e.questions.length} questions)</button>` : ""}
    </div>`).join("");

  grid.querySelectorAll("button[data-download]").forEach(btn => {
    btn.addEventListener("click", () => {
      const ex = allExamens.find(e => e.id === btn.dataset.download);
      withAccessCheck(ex, () => window.open(ex.pdf, "_blank", "noopener"));
    });
  });

  grid.querySelectorAll("button[data-correction]").forEach(btn => {
    btn.addEventListener("click", () => {
      const ex = allExamens.find(e => e.id === btn.dataset.correction);
      withAccessCheck(ex, () => window.open(ex.correction, "_blank", "noopener"));
    });
  });

  grid.querySelectorAll("button[data-quiz]").forEach(btn => {
    btn.addEventListener("click", () => {
      const ex = allExamens.find(e => e.id === btn.dataset.quiz);
      withAccessCheck(ex, () => startQuiz(ex));
    });
  });
}

function withAccessCheck(ex, action) {
  if (!ex.pdf && !ex.questions?.length) {
    showToast("Ce contenu n'est pas encore disponible.");
    return;
  }
  onAuthReady((_, profile) => {
    if (ex.premium && !profile?.premium) {
      showToast("Cet examen est réservé aux membres Premium.");
      setTimeout(() => window.location.href = "premium.html", 900);
      return;
    }
    action();
  });
}

function startQuiz(ex) {
  currentQuizItem = ex;
  currentAnswers = {};

  document.getElementById("filtersBar").style.display = "none";
  document.getElementById("examensList").style.display = "none";
  document.getElementById("emptyState").style.display = "none";
  document.getElementById("quizArea").style.display = "block";
  document.getElementById("quizResult").style.display = "none";
  document.getElementById("btn-correct-quiz").style.display = "inline-flex";
  document.getElementById("quizTitle").textContent = `🎯 Quiz — ${ex.titre}`;

  const container = document.getElementById("quizQuestions");
  container.innerHTML = ex.questions.map((q, qi) => `
    <div class="question-card" data-qi="${qi}">
      <h4>${qi + 1}. ${escapeHtml(q.q)}</h4>
      ${q.options.map((opt, oi) => `
        <button type="button" class="option-item" data-qi="${qi}" data-oi="${oi}">${escapeHtml(opt)}</button>
      `).join("")}
    </div>`).join("");

  container.querySelectorAll(".option-item").forEach(btn => {
    btn.addEventListener("click", () => {
      const qi = btn.dataset.qi;
      container.querySelectorAll(`.option-item[data-qi="${qi}"]`).forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      currentAnswers[qi] = Number(btn.dataset.oi);
    });
  });
}

function correctQuiz() {
  const ex = currentQuizItem;
  let score = 0;

  ex.questions.forEach((q, qi) => {
    const chosen = currentAnswers[qi];
    const card = document.querySelector(`.question-card[data-qi="${qi}"]`);
    if (chosen === q.correct) score++;

    card.querySelectorAll(".option-item").forEach(btn => {
      const oi = Number(btn.dataset.oi);
      btn.disabled = true;
      if (oi === q.correct) btn.classList.add("correct");
      else if (oi === chosen) btn.classList.add("incorrect");
    });

    if (q.explication) {
      const exp = document.createElement("div");
      exp.className = "explanation";
      exp.textContent = `💡 ${q.explication}`;
      card.appendChild(exp);
    }
  });

  document.getElementById("btn-correct-quiz").style.display = "none";
  const resultEl = document.getElementById("quizResult");
  resultEl.style.display = "block";
  resultEl.innerHTML = `
    <div class="quiz-score">
      <div class="big">${score} / ${ex.questions.length}</div>
      <p>Bonnes réponses</p>
    </div>`;
}

function backToList() {
  document.getElementById("quizArea").style.display = "none";
  document.getElementById("filtersBar").style.display = "flex";
  document.getElementById("examensList").style.display = "grid";
  renderExamensList();
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, s => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[s]));
}

document.addEventListener("DOMContentLoaded", async () => {
  const loader = document.getElementById("loader");
  const grid   = document.getElementById("examensList");

  if (typeof ALLOPROF_DATA !== "undefined") {
    const ns = document.getElementById("filterNiveau");
    ALLOPROF_DATA.niveaux.forEach(n => ns.innerHTML += `<option value="${n.id}">${n.nom}</option>`);
    const ms = document.getElementById("filterMatiere");
    ALLOPROF_DATA.matieres.forEach(m => ms.innerHTML += `<option value="${m.id}">${m.icone} ${m.nom}</option>`);
  }

  try {
    allExamens = await getExamensLib();
  } catch (err) {
    console.error(err);
    allExamens = [];
  }

  loader.style.display = "none";
  grid.style.display   = "grid";

  renderExamensList();

  ["filterNiveau", "filterMatiere"].forEach(id =>
    document.getElementById(id).addEventListener("change", renderExamensList)
  );

  document.getElementById("btn-correct-quiz").addEventListener("click", correctQuiz);
  document.getElementById("btn-back-to-list").addEventListener("click", backToList);
});
</script>
</body>
</html>
