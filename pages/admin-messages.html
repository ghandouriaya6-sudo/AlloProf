<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages — AlloProf Admin</title>
<link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>

<div class="admin-layout">
  <div id="sidebar-root"></div>

  <div class="admin-main">
    <div id="topbar-root"></div>

    <div class="admin-content">

      <div class="panel">
        <div class="panel__header">
          <div class="panel__title">Messages reçus</div>
          <div class="topbar__search" style="min-width:260px;">
            🔍 <input type="text" id="searchMessage" placeholder="Rechercher un message…">
          </div>
        </div>

        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Nom</th>
                <th>Email</th>
                <th>Sujet</th>
                <th>Date</th>
                <th>Statut</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="messagesTableBody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Modal : Voir le message -->
<div class="modal-overlay" id="view-modal">
  <div class="modal" style="max-width:520px;">
    <div class="modal__header">
      <div class="modal__title">Message</div>
      <button class="modal__close" id="btn-close-view-modal">✕</button>
    </div>
    <div class="modal__body">
      <div class="field full">
        <label>Nom</label>
        <p id="view-nom" style="font-weight:600;"></p>
      </div>
      <div class="field full">
        <label>Email</label>
        <p id="view-email"></p>
      </div>
      <div class="field full">
        <label>Sujet</label>
        <p id="view-sujet"></p>
      </div>
      <div class="field full">
        <label>Date</label>
        <p id="view-date"></p>
      </div>
      <div class="field full">
        <label>Message</label>
        <p id="view-message" style="white-space:pre-wrap; background:var(--surface-2,#F9FAFB); border-radius:8px; padding:12px;"></p>
      </div>
    </div>
    <div class="modal__footer">
      <a class="btn btn-primary" id="btn-reply-email" href="#" target="_blank">Répondre par email</a>
      <button class="btn btn-secondary" id="btn-close-view">Fermer</button>
    </div>
  </div>
</div>

<!-- Modal : Confirmation de suppression -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal" style="max-width:400px;">
    <div class="modal__body">
      <div class="confirm-box">
        <div class="icon">🗑️</div>
        <p id="confirm-message">Confirmer la suppression ?</p>
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn btn-secondary" id="confirm-no">Annuler</button>
      <button class="btn btn-danger" id="confirm-yes">Supprimer</button>
    </div>
  </div>
</div>

<script type="module" src="../assets/js/admin-messages.js"></script>
</body>
</html>
