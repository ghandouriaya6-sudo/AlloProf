<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau de bord — AlloProf Admin</title>
<link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>

<div class="admin-layout">
  <div id="sidebar-root"></div>

  <div class="admin-main">
    <div id="topbar-root"></div>

    <div class="admin-content">

      <div class="grid-stats" id="stats-grid"></div>

      <div class="panel">
        <div class="panel__header">
          <div class="panel__title">Vue d'ensemble du contenu</div>
        </div>
        <svg viewBox="0 0 400 220" width="100%" height="220" role="img" aria-label="Graphique du contenu">
          <g id="chart-content"></g>
        </svg>
      </div>

      <div class="panel">
        <div class="panel__header">
          <div class="panel__title">Activité récente</div>
        </div>
        <div id="activity-list"></div>
      </div>

    </div>
  </div>
</div>

<script type="module" src="../assets/js/admin-dashboard.js"></script>
</body>
</html>
