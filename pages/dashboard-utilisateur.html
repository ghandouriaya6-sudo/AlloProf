<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon espace — AlloProf</title>
<link rel="stylesheet" href="../assets/css/variables.css">
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="stylesheet" href="../assets/css/components.css">
<style>
  .dash-grid { display:grid;grid-template-columns:260px 1fr;gap:32px; }
  .dash-side  { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;height:fit-content;text-align:center; }
  .dash-avatar{ width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--orange));display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.8rem;font-weight:800;margin:0 auto 12px; }
  .dash-nav a { display:block;padding:10px 0;text-align:left;font-weight:600;border-bottom:1px solid var(--border); }
  .dash-nav a:last-child { border:none; }
  .stat-card  { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;text-align:center; }
  .stat-card strong { display:block;font-size:2rem;color:var(--blue);font-weight:800; }
  @media(max-width:800px){ .dash-grid{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<div id="navbar-mount"></div>
<main class="container section" id="dashContainer"><div class="loader"></div></main>
<div id="footer-mount"></div>

<script src="../data/data.js"></script>
<script type="module" src="../assets/js/app.js"></script>
<script type="module">
import { onAuthReady, requireAuth, courseCardHTML } from "../assets/js/app.js";
import { getCourses, getUserProgress, getUserResults } from "../assets/js/firestore.js";
console.log("Dashboard chargé");
requireAuth();

onAuthReady(async (user, profile) => {
  console.log(user);
  console.log(profile);
  const container = document.getElementById("dashContainer");
  if (!user || !profile) return;

  const prenom  = profile.prenom || "";
  const nom     = profile.nom    || "";
  const initials = (prenom.charAt(0) + nom.charAt(0)).toUpperCase() || "?";

  // Charger données Firestore en parallèle
  console.log("Avant getCourses");
const allCourses = await getCourses();
console.log("Courses", allCourses);

console.log("Avant progress");
const progress = await getUserProgress(user.uid);
console.log("Progress", progress);

console.log("Avant results");
const results = await getUserResults(user.uid);
console.log("Results", results);

  const suivis   = allCourses.filter(c => (progress[c.id] || 0) > 0);
  const termines = allCourses.filter(c => (progress[c.id] || 0) >= 100);

  container.innerHTML = `
  <h1 class="section-title">Bonjour, ${prenom || nom} 👋</h1>
  <p class="section-subtitle">Voici un aperçu de ta progression sur AlloProf.</p>

  <div class="dash-grid">
    <aside class="dash-side">
      <div class="dash-avatar">${initials}</div>
      <strong>${prenom} ${nom}</strong>
      <p style="color:var(--gray);font-size:.85rem;margin-bottom:12px;">${profile.email}</p>
      ${profile.premium
        ? '<span class="badge badge-premium">⭐ Premium</span>'
        : '<a href="premium.html" class="btn btn-cta btn-sm" style="margin-top:6px;">Passer Premium</a>'}
      <nav class="dash-nav" style="margin-top:20px;">
        <a href="profil.html">👤 Mon profil</a>
        <a href="cours.html">📚 Tous les cours</a>
        <a href="exercices.html">📝 Exercices</a>
        <a href="examens.html">🎓 Examens</a>
        <a href="premium.html">⭐ Premium</a>
      </nav>
    </aside>

    <div>
      <div class="grid grid-3" style="margin-bottom:32px;">
        <div class="stat-card"><strong>${suivis.length}</strong>Cours suivis</div>
        <div class="stat-card"><strong>${termines.length}</strong>Cours terminés</div>
        <div class="stat-card"><strong>${results.length}</strong>Examens passés</div>
      </div>

      <h2 style="margin-bottom:16px;">Mes cours en cours</h2>
      <div class="grid grid-3" id="suiviGrid"></div>

      ${results.length > 0 ? `
      <h2 style="margin:32px 0 16px;">Derniers examens</h2>
      <div id="resultsGrid"></div>` : ""}
    </div>
  </div>`;

  // Cartes des cours suivis avec vraie progression Firestore
  const suiviGrid = document.getElementById("suiviGrid");
  if (suivis.length) {
    suiviGrid.innerHTML = suivis.map(c => courseCardHTML(c, progress)).join("");
  } else {
    suiviGrid.innerHTML = `<p class="empty-state" style="grid-column:1/-1">
      Tu n'as pas encore commencé de cours.
      <a href="cours.html" style="color:var(--blue);">Explorer les cours →</a>
    </p>`;
  }

  // Résultats d'examens (5 derniers)
  const resGrid = document.getElementById("resultsGrid");
  if (resGrid && results.length) {
    resGrid.innerHTML = results.slice(0, 5).map(r => `
      <div class="card card-body" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <span>${r.examTitre || "Examen"}</span>
        <span class="badge ${r.pourcentage >= 60 ? 'badge-free' : 'badge-level'}">${r.pourcentage}%</span>
      </div>`).join("");
  }
});
</script>
</body>
</html>
