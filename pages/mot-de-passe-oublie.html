<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mot de passe oublié — AlloProf</title>
<link rel="stylesheet" href="../assets/css/variables.css">
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>
<div id="navbar-mount"></div>

<main class="container section">
  <div class="form-card fade-in">
    <h1 class="text-center" style="margin-bottom:8px;">Mot de passe oublié</h1>
    <p class="text-center section-subtitle">
      Saisis ton adresse email et nous t'enverrons un lien pour réinitialiser ton mot de passe.
    </p>

    <div id="successBanner" style="display:none;background:#DCFCE7;color:#166534;border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:16px;font-size:.9rem;"></div>
    <div id="errorBanner"   style="display:none;background:#FEE2E2;color:#991B1B;border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:16px;font-size:.9rem;"></div>

    <form id="resetForm" novalidate>
      <div class="form-group">
        <label for="email">Adresse email</label>
        <input type="email" id="email" class="form-control" autocomplete="email" required>
        <div class="form-error">Merci d'entrer une adresse email valide.</div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Envoyer le lien</button>
    </form>

    <p class="text-center" style="margin-top:18px;font-size:.9rem;color:var(--gray);">
      <a href="connexion.html" style="color:var(--blue);font-weight:600;">← Retour à la connexion</a>
    </p>
  </div>
</main>

<div id="footer-mount"></div>

<script src="../data/data.js"></script>
<script type="module" src="../assets/js/app.js"></script>
<script type="module">
import { validateField, showToast } from "../assets/js/app.js";
import { resetPassword } from "../firebase/auth.js";

const form          = document.getElementById("resetForm");
const submitBtn     = document.getElementById("submitBtn");
const successBanner = document.getElementById("successBanner");
const errorBanner   = document.getElementById("errorBanner");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  successBanner.style.display = "none";
  errorBanner.style.display   = "none";

  const emailEl = document.getElementById("email");
  if (!validateField(emailEl, { required: true, email: true })) return;

  submitBtn.disabled    = true;
  submitBtn.textContent = "Envoi en cours…";

  const { success, error } = await resetPassword(emailEl.value.trim());

  if (success) {
    successBanner.textContent  = "✅ Un email de réinitialisation t'a été envoyé. Vérifie ta boîte de réception (et tes spams).";
    successBanner.style.display = "block";
    emailEl.value = "";
  } else {
    errorBanner.textContent  = error;
    errorBanner.style.display = "block";
  }

  submitBtn.disabled    = false;
  submitBtn.textContent = "Envoyer le lien";
});
</script>
</body>
</html>
