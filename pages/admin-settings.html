<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paramètres — AlloProf Admin</title>
<link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>

<div class="admin-layout">
  <div id="sidebar-root"></div>

  <div class="admin-main">
    <div id="topbar-root"></div>

    <div class="admin-content">

      <div class="panel">
        <div class="panel__header">
          <div class="panel__title">Paramètres généraux</div>
        </div>

        <form id="settings-form" style="max-width:560px;">
          <div class="form-grid">
            <div class="field full">
              <label>Nom du site</label>
              <input type="text" id="f-siteName" placeholder="AlloProf">
            </div>
            <div class="field full">
              <label>Email administrateur</label>
              <input type="email" id="f-adminEmail" placeholder="admin@alloprof.ma">
            </div>
            <div class="field full">
              <label>Téléphone de contact</label>
              <input type="text" id="f-contactPhone" placeholder="+212 6 00 00 00 00">
            </div>
            <div class="field full">
              <label class="switch">
                <input type="checkbox" id="f-maintenance">
                <span class="track"></span>
                Mode maintenance
              </label>
              <span class="hint">Désactive temporairement l'accès public au site.</span>
            </div>
          </div>
        </form>
      </div>

      <div class="panel">
        <div class="panel__header">
          <div class="panel__title">Coordonnées bancaires (RIB)</div>
        </div>
        <p style="font-size:0.85rem;color:var(--ink-soft);margin-bottom:16px;">
          Ces informations s'affichent sur la page "Demande Premium" pour que les utilisateurs
          sachent où effectuer leur virement avant d'envoyer leur preuve de paiement.
        </p>
        <form id="rib-form" style="max-width:560px;">
          <div class="form-grid">
            <div class="field full">
              <label>Nom de la banque</label>
              <input type="text" id="f-bankName" placeholder="Ex : Attijariwafa Bank">
            </div>
            <div class="field full">
              <label>Titulaire du compte</label>
              <input type="text" id="f-ribHolder" placeholder="Ex : AlloProf SARL">
            </div>
            <div class="field full">
              <label>RIB</label>
              <input type="text" id="f-ribNumber" placeholder="Ex : 007 780 0001234500000123 45">
            </div>
            <div class="field full">
              <label>IBAN (optionnel)</label>
              <input type="text" id="f-ribIban" placeholder="Ex : MA64 0077 8000 1234 5000 0012 345">
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="btn-submit-rib" style="margin-top:20px;">Enregistrer</button>
        </form>
      </div>

    </div>
  </div>
</div>

<script type="module" src="../assets/js/admin-settings.js"></script>
</body>
</html>
