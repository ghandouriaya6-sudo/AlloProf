<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon profil — AlloProf</title>
<link rel="stylesheet" href="../assets/css/variables.css">
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="stylesheet" href="../assets/css/components.css">
<style>
  .avatar {
    width:96px;height:96px;border-radius:50%;
    background:linear-gradient(135deg,var(--blue),var(--orange));
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:2rem;font-weight:800;margin:0 auto 16px;
  }
</style>
</head>
<body>
<div id="navbar-mount"></div>

<main class="container section">
  <div id="profileArea" class="form-card fade-in">
    <div class="loader"></div>
  </div>
</main>

<div id="footer-mount"></div>

<script src="../data/data.js"></script>
<script type="module" src="../assets/js/app.js"></script>
<script type="module">
import { onAuthReady, requireAuth, showToast, validateField } from "../assets/js/app.js";
import {
  logoutUser,
  updateUserProfile,
  uploadAvatar
} from "../firebase/auth.js";
requireAuth();

onAuthReady(async (user, profile) => {
  const area = document.getElementById("profileArea");
  if (!user || !profile) { return; } // requireAuth redirige déjà

  const prenom  = profile.prenom || "";
  const nom     = profile.nom    || "";
  const initials = (prenom.charAt(0) + nom.charAt(0)).toUpperCase() || "?";

  area.innerHTML = `
    ${
  profile.photoURL
    ? `<img src="${profile.photoURL}" class="avatar" style="object-fit:cover;">`
    : `<div class="avatar">${initials}</div>`
}
    <h1 class="text-center" style="margin-bottom:4px;">${prenom} ${nom}</h1>
    <p class="text-center section-subtitle">
      ${profile.email}
      ${profile.premium ? '<span class="badge badge-premium">⭐ Premium</span>' : ''}
    </p>

    <div id="successMsg" style="display:none;background:#DCFCE7;color:#166534;border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:14px;font-size:.9rem;"></div>

    <form id="profileForm" novalidate>
      <div class="form-row-2">
        <div class="form-group">
          <label for="prenom">Prénom</label>
          <input type="text" id="prenom" class="form-control" value="${prenom}">
          <div class="form-error">Prénom requis.</div>
        </div>
        <div class="form-group">
          <label for="nom">Nom</label>
          <input type="text" id="nom" class="form-control" value="${nom}">
          <div class="form-error">Nom requis.</div>
        </div>
      </div>
      <div class="form-group">
        <label for="email">Adresse email</label>
        <input type="email" id="email" class="form-control" value="${profile.email}" disabled>
      </div>
      <div class="form-group">
  <label for="telephone">Téléphone</label>
  <input
    type="tel"
    id="telephone"
    class="form-control"
    value="${profile.telephone || ""}">
</div>

<div class="form-row-2">

  <div class="form-group">
    <label for="region">Région</label>
    <input
      type="text"
      id="region"
      class="form-control"
      value="${profile.region || ""}">
  </div>

  <div class="form-group">
    <label for="ville">Ville</label>
    <input
      type="text"
      id="ville"
      class="form-control"
      value="${profile.ville || ""}">
  </div>

</div>
      <div class="form-group">
        <label for="niveau">Niveau scolaire</label>
        <select id="niveau" class="form-control"></select>
      </div>
      <div class="form-group">
  <label for="avatar">Photo de profil</label>
  <input
    type="file"
    id="avatar"
    class="form-control"
    accept="image/*">
</div>
      <button type="submit" class="btn btn-primary btn-block" id="saveBtn">Enregistrer les modifications</button>
    </form>

    <hr style="margin:24px 0;border:none;border-top:1px solid var(--border);">
    <button class="btn btn-secondary btn-block" id="logoutBtn">Se déconnecter</button>
  `;

  // Peupler le select niveau
  if (typeof ALLOPROF_DATA !== "undefined") {
    const sel = document.getElementById("niveau");
    ALLOPROF_DATA.niveaux.forEach(n => {
      sel.innerHTML += `<option value="${n.id}" ${profile.niveau === n.id ? "selected" : ""}>${n.nom}</option>`;
    });
  }

  document.getElementById("profileForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const prenomEl = document.getElementById("prenom");
    const nomEl    = document.getElementById("nom");
    const niveauEl = document.getElementById("niveau");
    const telephoneEl = document.getElementById("telephone");
const regionEl = document.getElementById("region");
const villeEl = document.getElementById("ville");
    const ok1 = validateField(prenomEl, { required: true });
    const ok2 = validateField(nomEl,    { required: true });
    if (!ok1 || !ok2) return;

    const saveBtn = document.getElementById("saveBtn");
    saveBtn.disabled    = true;
    saveBtn.textContent = "Enregistrement…";
    const avatarFile = document.getElementById("avatar").files[0];

if (avatarFile) {
  await uploadAvatar(user.uid, avatarFile);
}
    await updateUserProfile(user.uid, {
  prenom: prenomEl.value.trim(),
  nom: nomEl.value.trim(),
  telephone: telephoneEl.value.trim(),
  region: regionEl.value.trim(),
  ville: villeEl.value.trim(),
  niveau: niveauEl.value
});
    const msg = document.getElementById("successMsg");
    msg.textContent  = "✅ Profil mis à jour avec succès.";
    msg.style.display = "block";
    saveBtn.disabled    = false;
    saveBtn.textContent = "Enregistrer les modifications";
  });

  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await logoutUser();
    showToast("Déconnexion réussie.");
    setTimeout(() => window.location.href = "../index.html", 700);
  });
});
</script>
</body>
</html>
