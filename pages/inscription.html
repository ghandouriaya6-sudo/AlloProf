<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription — AlloProf</title>
<link rel="stylesheet" href="../assets/css/variables.css">
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>
<div id="navbar-mount"></div>

<main class="container section">
  <div class="form-card fade-in">
    <h1 class="text-center" style="margin-bottom:8px;">Créer un compte</h1>
    <p class="text-center section-subtitle">Rejoins gratuitement la communauté AlloProf.</p>

    <div id="errorBanner" style="display:none;background:#FEE2E2;color:#991B1B;border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:16px;font-size:.9rem;"></div>

    <form id="registerForm" novalidate>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 16px;">
        <div class="form-group">
          <label for="prenom">Prénom</label>
          <input type="text" id="prenom" class="form-control" autocomplete="given-name" required>
          <div class="form-error">Prénom requis.</div>
        </div>
        <div class="form-group">
          <label for="nom">Nom</label>
          <input type="text" id="nom" class="form-control" autocomplete="family-name" required>
          <div class="form-error">Nom requis.</div>
        </div>
      </div>
      <div class="form-group">
        <label for="email">Adresse email</label>
        <input type="email" id="email" class="form-control" autocomplete="email" required>
        <div class="form-error">Merci d'entrer une adresse email valide.</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 16px;">

  <div class="form-group">
    <label for="telephone">Téléphone</label>
    <input
      type="tel"
      id="telephone"
      class="form-control"
      placeholder="06XXXXXXXX"
      required>
    <div class="form-error">
      Numéro invalide.
    </div>
  </div>

  <div class="form-group">
    <label for="region">Région</label>
    <select id="region" class="form-control" required>
      <option value="">Choisir...</option>
      <option>Casablanca-Settat</option>
      <option>Rabat-Salé-Kénitra</option>
      <option>Marrakech-Safi</option>
      <option>Fès-Meknès</option>
      <option>Tanger-Tétouan-Al Hoceïma</option>
      <option>Souss-Massa</option>
      <option>Oriental</option>
      <option>Béni Mellal-Khénifra</option>
      <option>Drâa-Tafilalet</option>
      <option>Guelmim-Oued Noun</option>
      <option>Laâyoune-Sakia El Hamra</option>
      <option>Dakhla-Oued Ed-Dahab</option>
    </select>
  </div>

</div>

<div class="form-group">
  <label for="ville">Ville</label>
  <input
    type="text"
    id="ville"
    class="form-control"
    placeholder="Ex : Casablanca">
</div>
      <div class="form-group">
        <label for="niveau">Niveau scolaire</label>
        <select id="niveau" class="form-control"></select>
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" class="form-control" autocomplete="new-password" required>
        <div class="form-error">Le mot de passe doit contenir au moins 6 caractères.</div>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirmer le mot de passe</label>
        <input type="password" id="confirmPassword" class="form-control" autocomplete="new-password" required>
        <div class="form-error">Les mots de passe ne correspondent pas.</div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Créer mon compte</button>
    </form>

    <p class="text-center" style="margin-top:18px;font-size:.9rem;color:var(--gray);">
      Déjà inscrit ? <a href="connexion.html" style="color:var(--blue);font-weight:600;">Se connecter</a>
    </p>
  </div>
</main>

<div id="footer-mount"></div>

<script src="../data/data.js"></script>
<script type="module" src="../assets/js/app.js"></script>
<script type="module">
import { showToast, validateField, onAuthReady } from "../assets/js/app.js";
import { registerUser } from "../firebase/auth.js";

// Si déjà connecté → dashboard
onAuthReady((user) => {
  if (user) window.location.href = "dashboard-utilisateur.html";
});

// Remplir les niveaux depuis data.js
document.addEventListener("DOMContentLoaded", () => {
  const sel = document.getElementById("niveau");
  if (typeof ALLOPROF_DATA !== "undefined") {
    ALLOPROF_DATA.niveaux.forEach(n => {
      sel.innerHTML += `<option value="${n.id}">${n.nom}</option>`;
    });
  }
});

const form        = document.getElementById("registerForm");
const submitBtn   = document.getElementById("submitBtn");
const errorBanner = document.getElementById("errorBanner");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errorBanner.style.display = "none";

  const prenomEl   = document.getElementById("prenom");
  const nomEl      = document.getElementById("nom");
  const emailEl    = document.getElementById("email");
  const telephoneEl = document.getElementById("telephone");
const regionEl = document.getElementById("region");
const villeEl = document.getElementById("ville");
  const passwordEl = document.getElementById("password");
  const confirmEl  = document.getElementById("confirmPassword");
  const niveauEl   = document.getElementById("niveau");

  const ok1 = validateField(prenomEl,   { required: true });
  const ok2 = validateField(nomEl,      { required: true });
  const ok3 = validateField(emailEl,    { required: true, email: true });
  const okTelephone = validateField(telephoneEl,{required:true});
const okRegion = validateField(regionEl,{required:true});
  const ok4 = validateField(passwordEl, { required: true, minLength: 6 });
  const pwMatch = passwordEl.value === confirmEl.value && confirmEl.value.length > 0;
  confirmEl.closest(".form-group").classList.toggle("invalid", !pwMatch);

  if (
    !ok1 ||
    !ok2 ||
    !ok3 ||
    !okTelephone ||
    !okRegion ||
    !ok4 ||
    !pwMatch
) return;

  submitBtn.disabled    = true;
  submitBtn.textContent = "Création du compte…";

  const { user, error } = await registerUser(
  nomEl.value.trim(),
  prenomEl.value.trim(),
  emailEl.value.trim(),
  passwordEl.value,
  niveauEl.value,
  telephoneEl.value.trim(),
  regionEl.value,
  villeEl.value.trim()
);

  if (error) {
    errorBanner.textContent  = error;
    errorBanner.style.display = "block";
    submitBtn.disabled    = false;
    submitBtn.textContent = "Créer mon compte";
    return;
  }

  showToast("Compte créé avec succès ! Bienvenue 🎉");
  setTimeout(() => window.location.href = "dashboard-utilisateur.html", 800);
});
</script>
</body>
</html>
