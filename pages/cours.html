<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cours — AlloProf</title>
<meta name="description" content="Tous les cours AlloProf, du Primaire au Lycée, dans toutes les matières.">
<link rel="stylesheet" href="../assets/css/variables.css">
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>
<div id="navbar-mount"></div>

<main class="container section">
  
  <h1 class="section-title">Tous les cours</h1>
  <p class="section-subtitle">Filtre par matière, niveau ou recherche un cours précis.</p>

  <div class="filters-bar">
    <input type="text" id="searchInput" placeholder="Rechercher un cours…" aria-label="Recherche">
    <select id="filterMatiere" aria-label="Matière"><option value="">Toutes les matières</option></select>
    <select id="filterNiveau"  aria-label="Niveau"><option value="">Tous les niveaux</option></select>
    <select id="filterAcces"   aria-label="Accès">
      <option value="">Tous les cours</option>
      <option value="gratuit">Gratuit</option>
      <option value="premium">Premium</option>
    </select>
  </div>

  <div id="loader" class="loader"></div>
  <div class="grid grid-3" id="coursGrid"  style="display:none;"></div>
  <div class="empty-state"  id="emptyState" style="display:none;">Aucun cours ne correspond à ta recherche.</div>
  <div class="pagination"   id="pagination"></div>
</main>

<div id="footer-mount"></div>

<script src="../data/data.js"></script>
<script type="module" src="../assets/js/app.js"></script>
<script type="module">
import { onAuthReady, courseCardHTML, matiereNom, niveauNom } from "../assets/js/app.js";
import { getCourses, getUserProgress }                         from "../assets/js/firestore.js";

const PAGE_SIZE = 6;
let currentPage = 1;
let allCourses  = [];
let userProgress = {};

function getFiltered() {
  const q       = document.getElementById("searchInput").value.trim().toLowerCase();
  const matiere = document.getElementById("filterMatiere").value;
  const niveau  = document.getElementById("filterNiveau").value;
  const acces   = document.getElementById("filterAcces").value;
  return allCourses.filter(c => {
    if (q && !c.titre.toLowerCase().includes(q) && !(c.description || "").toLowerCase().includes(q)) return false;
    if (matiere && c.matiere !== matiere) return false;
    if (niveau  && c.niveau  !== niveau)  return false;
    if (acces === "gratuit" &&  c.premium) return false;
    if (acces === "premium" && !c.premium) return false;
    return true;
  });
}

function render() {
  const grid      = document.getElementById("coursGrid");
  const empty     = document.getElementById("emptyState");
  const paginator = document.getElementById("pagination");
  const filtered  = getFiltered();

  document.getElementById("loader").style.display = "none";
  grid.style.display = "grid";

  if (!filtered.length) {
    grid.innerHTML    = "";
    empty.style.display = "block";
    paginator.innerHTML = "";
    return;
  }
  empty.style.display = "none";

  const total = Math.ceil(filtered.length / PAGE_SIZE);
  if (currentPage > total) currentPage = 1;
  const slice = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);
  grid.innerHTML = slice.map(c => courseCardHTML(c, userProgress)).join("");

  paginator.innerHTML = "";
  for (let i = 1; i <= total; i++) {
    const btn = document.createElement("button");
    btn.textContent = i;
    if (i === currentPage) btn.classList.add("active");
    btn.addEventListener("click", () => { currentPage = i; render(); scrollTo({ top: 0, behavior: "smooth" }); });
    paginator.appendChild(btn);
  }
}

document.addEventListener("DOMContentLoaded", async () => {
  // Peupler les filtres depuis data.js
  if (typeof ALLOPROF_DATA !== "undefined") {
    const ms = document.getElementById("filterMatiere");
    ALLOPROF_DATA.matieres.forEach(m => ms.innerHTML += `<option value="${m.id}">${m.icone} ${m.nom}</option>`);
    const ns = document.getElementById("filterNiveau");
    ALLOPROF_DATA.niveaux.forEach(n => ns.innerHTML += `<option value="${n.id}">${n.nom}</option>`);
  }

  // Appliquer params URL (?matiere=, ?q=)
  const params = new URLSearchParams(location.search);
  if (params.get("matiere")) document.getElementById("filterMatiere").value = params.get("matiere");
  if (params.get("niveau"))  document.getElementById("filterNiveau").value  = params.get("niveau");
  if (params.get("q"))       document.getElementById("searchInput").value   = params.get("q");

  // Écouter filtres
  ["searchInput"].forEach(id =>
    document.getElementById(id).addEventListener("input",  () => { currentPage = 1; render(); })
  );
  ["filterMatiere","filterNiveau","filterAcces"].forEach(id =>
    document.getElementById(id).addEventListener("change", () => { currentPage = 1; render(); })
  );

  // Charger cours depuis Firestore
  document.getElementById("loader").style.display = "block";

allCourses = await getCourses();

document.getElementById("loader").style.display = "none";

render();
});

// Charger la progression utilisateur si connecté
onAuthReady(async (user) => {
  if (user) {
    
    userProgress = await getUserProgress(user.uid);
    render();
  }
});
</script>
</body>
</html>
