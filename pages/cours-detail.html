<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Cours — AlloProf</title>
<link rel="stylesheet" href="../assets/css/variables.css">
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="stylesheet" href="../assets/css/components.css">
<style>
  .chapitre-item { display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px;background:var(--surface);transition:border-color var(--transition); }
  .chapitre-item:hover { border-color:var(--blue); }
  .chapitre-left { display:flex;align-items:center;gap:12px; }
  .chapitre-check { width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background var(--transition),border-color var(--transition);user-select:none; }
  .chapitre-check.done { background:var(--blue);border-color:var(--blue);color:#fff; }
  .video-placeholder,.pdf-placeholder { background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--gray);padding:48px;margin-bottom:24px; }
</style>
</head>
<body>
<div id="navbar-mount"></div>

<main class="container section">
  <div class="breadcrumb"><a href="../index.html">Accueil</a> / <a href="cours.html">Cours</a> / <span id="breadcrumbTitle">…</span></div>
  <div id="courseContent"><div class="loader"></div></div>
</main>

<div id="footer-mount"></div>

<script src="../data/data.js"></script>
<script type="module" src="../assets/js/app.js"></script>
<script type="module">
import { onAuthReady, showToast, matiereNom, niveauNom, matiereIcone } from "../assets/js/app.js";
import { getCourse, getUserProgress, updateCourseProgress }             from "../assets/js/firestore.js";

const params = new URLSearchParams(location.search);
const courseId = params.get("id");

/**
 * Convertit une URL YouTube (watch?v=, youtu.be/, embed/ ou shorts/) en URL "embed"
 * exploitable dans une balise <iframe>. Retourne "" si l'URL est absente ou invalide.
 */
function toEmbedUrl(url) {
  if (!url) return "";
  try {
    const u = new URL(url.trim());
    let videoId = "";
    if (u.hostname.includes("youtu.be")) {
      videoId = u.pathname.slice(1);
    } else if (u.hostname.includes("youtube.com")) {
      if (u.pathname.startsWith("/embed/")) return url; // déjà au bon format
      if (u.pathname.startsWith("/shorts/")) videoId = u.pathname.split("/")[2];
      else videoId = u.searchParams.get("v");
    }
    return videoId ? `https://www.youtube.com/embed/${videoId}` : "";
  } catch (_) {
    return "";
  }
}

onAuthReady(async (user, profile) => {
  const cours = await getCourse(courseId);
  if (!cours) {
    document.getElementById("courseContent").innerHTML =
      `<p class="empty-state">Cours introuvable. <a href="cours.html">Retour aux cours</a></p>`;
    return;
  }

  document.getElementById("pageTitle").textContent      = cours.titre + " — AlloProf";
  document.getElementById("breadcrumbTitle").textContent = cours.titre;

  const isPremiumLocked = cours.premium && !(profile?.premium);
  const progress = user ? await getUserProgress(user.uid) : {};
  const pct = progress[cours.id] ?? cours.progression ?? 0;

  const container = document.getElementById("courseContent");
  container.innerHTML = `
    <div class="card-meta" style="margin-bottom:14px;">
      <span class="badge badge-level">${niveauNom(cours.niveau)}</span>
      <span class="badge badge-level">${matiereNom(cours.matiere)}</span>
      ${cours.premium ? '<span class="badge badge-premium">⭐ Premium</span>' : '<span class="badge badge-free">Gratuit</span>'}
    </div>
    <h1 class="section-title">${cours.titre}</h1>
    <p class="section-subtitle">${cours.description}</p>

    ${isPremiumLocked ? `
      <div class="card card-body" style="border-color:var(--orange);margin-bottom:24px;">
        <h3>🔒 Cours réservé aux membres Premium</h3>
        <p class="card-desc">Abonne-toi à AlloProf Premium pour débloquer ce cours et tous les contenus exclusifs.</p>
        <a href="premium.html" class="btn btn-cta">Découvrir Premium →</a>
      </div>
    ` : `
      ${toEmbedUrl(cours.youtube) ? `
      <div class="video-wrap" style="position:relative;padding-top:56.25%;border-radius:var(--radius-lg);overflow:hidden;margin-bottom:24px;background:#000;">
        <iframe src="${toEmbedUrl(cours.youtube)}" title="Vidéo — ${cours.titre}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
      ` : `
      <div class="video-placeholder">
        <div style="font-size:2.5rem;">▶️</div>
        <span>Vidéo du cours — ${cours.duree || ""}</span>
        <small style="color:var(--gray);">Aucune vidéo n'a encore été ajoutée pour ce cours.</small>
      </div>
      `}
      <div class="pdf-placeholder">
        <div style="font-size:2rem;">📄</div>
        <span>Support de cours PDF</span>
        <button class="btn btn-secondary btn-sm" id="downloadPdfBtn">Télécharger le PDF</button>
      </div>

      <h2 style="margin:32px 0 16px;">Chapitres</h2>
      <div id="chapitresList"></div>

      <div class="card-progress" style="margin:24px 0 8px;"><div id="progressBar" style="width:${pct}%"></div></div>
      <p style="color:var(--gray);margin-bottom:20px;" id="progressLabel">${pct}% terminé</p>

      ${user
        ? `<button class="btn btn-primary" id="finishBtn">✅ Marquer comme terminé</button>`
        : `<a href="connexion.html" class="btn btn-primary">Connecte-toi pour sauvegarder ta progression</a>`}
    `}
  `;

  if (!isPremiumLocked) {
    // Chapitres
    const chapitres = cours.chapitres || [];
    const list = document.getElementById("chapitresList");
    list.innerHTML = chapitres.map((ch, i) => `
      <div class="chapitre-item">
        <div class="chapitre-left">
          <div class="chapitre-check ${pct >= Math.round(((i+1)/chapitres.length)*100) ? 'done' : ''}" data-index="${i}">
            ${pct >= Math.round(((i+1)/chapitres.length)*100) ? "✓" : i+1}
          </div>
          <span>${ch.titre}</span>
        </div>
        <small style="color:var(--gray);">${ch.duree || ""}</small>
      </div>`).join("");

    list.querySelectorAll(".chapitre-check").forEach(el => {
      el.addEventListener("click", () => {
        el.classList.toggle("done");
        el.textContent = el.classList.contains("done") ? "✓" : (parseInt(el.dataset.index) + 1);
      });
    });

    document.getElementById("downloadPdfBtn")?.addEventListener("click", () => {
      if (cours.pdf) {
        window.open(cours.pdf, "_blank", "noopener");
      } else {
        showToast("Aucun PDF n'a encore été ajouté pour ce cours.");
      }
    });

    document.getElementById("finishBtn")?.addEventListener("click", async () => {
      document.getElementById("progressBar").style.width = "100%";
      document.getElementById("progressLabel").textContent = "100% terminé 🎉";
      if (user) {
        await updateCourseProgress(user.uid, cours.id, 100);
        showToast("Progression sauvegardée dans Firestore !");
      }
    });
  }
});
</script>
</body>
</html>
