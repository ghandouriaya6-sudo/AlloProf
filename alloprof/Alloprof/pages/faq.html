<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAQ — AlloProf</title>
<link rel="stylesheet" href="../assets/css/variables.css">
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="stylesheet" href="../assets/css/components.css">
<style>
  .faq-item { border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 12px; overflow: hidden; background: var(--surface); }
  .faq-question { padding: 18px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
  .faq-answer { max-height: 0; overflow: hidden; transition: max-height var(--transition); padding: 0 20px; color: var(--gray); }
  .faq-item.open .faq-answer { max-height: 300px; padding-bottom: 18px; }
  .faq-item.open .faq-icon { transform: rotate(45deg); }
  .faq-icon { transition: transform var(--transition); }
</style>
</head>
<body>
<div id="navbar-mount"></div>

<main class="container section">
  <h1 class="section-title">Questions fréquentes</h1>
  <p class="section-subtitle">Trouve rapidement une réponse à tes questions.</p>

  <div id="faqList" style="max-width:800px;"></div>
</main>

<div id="footer-mount"></div>

<script src="../data/data.js"></script>
<script src="../assets/js/app.js"></script>
<script>
const faqs = [
  { q: "AlloProf est-il gratuit ?", a: "Oui, l'inscription et de nombreux cours sont entièrement gratuits. Un abonnement Premium optionnel débloque des fonctionnalités avancées." },
  { q: "Pour quels niveaux scolaires est conçu AlloProf ?", a: "AlloProf couvre le Primaire, le Collège et le Lycée, dans toutes les matières du programme marocain." },
  { q: "Comment fonctionne la correction des exercices ?", a: "Les QCM sont corrigés automatiquement et affichent ton score ainsi que des explications détaillées pour chaque question." },
  { q: "Puis-je télécharger les cours en PDF ?", a: "Le téléchargement PDF est disponible pour les membres Premium." },
  { q: "Comment devenir membre Premium ?", a: "Rends-toi sur la page Premium et choisis l'offre mensuelle ou annuelle qui te convient." },
  { q: "Mes données sont-elles sécurisées ?", a: "Oui, consulte notre politique de confidentialité pour plus de détails sur la protection de tes données." }
];

document.addEventListener("DOMContentLoaded", () => {
  const list = document.getElementById("faqList");
  list.innerHTML = faqs.map((f, i) => `
    <div class="faq-item" id="faq-${i}">
      <div class="faq-question">${f.q} <span class="faq-icon">+</span></div>
      <div class="faq-answer">${f.a}</div>
    </div>
  `).join("");

  list.querySelectorAll(".faq-item").forEach(item => {
    item.querySelector(".faq-question").addEventListener("click", () => {
      item.classList.toggle("open");
    });
  });
});
</script>
</body>
</html>
