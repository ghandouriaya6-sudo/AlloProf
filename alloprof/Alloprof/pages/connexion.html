<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — AlloProf</title>
<meta name="description" content="Connecte-toi à ton espace AlloProf.">
<link rel="stylesheet" href="../assets/css/variables.css">
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>
<div id="navbar-mount"></div>

<main class="container section">
  <div class="form-card fade-in">
    <h1 class="text-center" style="margin-bottom:8px;">Connexion</h1>
    <p class="text-center section-subtitle">Heureux de te revoir sur AlloProf !</p>

    <div id="errorBanner" style="display:none;background:#FEE2E2;color:#991B1B;border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:16px;font-size:.9rem;"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Adresse email</label>
        <input type="email" id="email" class="form-control" autocomplete="email" required>
        <div class="form-error">Merci d'entrer une adresse email valide.</div>
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" class="form-control" autocomplete="current-password" required>
        <div class="form-error">Le mot de passe est requis.</div>
      </div>
      <p style="text-align:right;margin-bottom:14px;">
        <a href="mot-de-passe-oublie.html" style="color:var(--blue);font-size:.88rem;">Mot de passe oublié ?</a>
      </p>
      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Se connecter</button>
    </form>

    <p class="text-center" style="margin-top:18px;font-size:.9rem;color:var(--gray);">
      Pas encore de compte ? <a href="inscription.html" style="color:var(--blue);font-weight:600;">Créer un compte gratuit</a>
    </p>
    <p class="text-center" style="margin-top:10px;font-size:.8rem;color:var(--gray);">
      Membre de l'équipe AlloProf ? <a href="admin-connexion.html" style="color:var(--gray);text-decoration:underline;">Connexion administrateur</a>
    </p>
  </div>
</main>

<div id="footer-mount"></div>

<script src="../data/data.js"></script>
<script type="module" src="../assets/js/app.js"></script>
<script type="module">
import { showToast, validateField, onAuthReady } from "../assets/js/app.js";
import { loginUser, getUserProfile } from "../firebase/auth.js";

// Si déjà connecté, rediriger directement vers l'espace élève.
// L'espace admin est désormais totalement indépendant : voir admin-connexion.html.
onAuthReady((user) => {
  if (user) window.location.href = "dashboard-utilisateur.html";
});

const form      = document.getElementById("loginForm");
const submitBtn = document.getElementById("submitBtn");
const errorBanner = document.getElementById("errorBanner");

function showError(msg) {
  errorBanner.textContent = msg;
  errorBanner.style.display = "block";
}
function clearError() {
  errorBanner.style.display = "none";
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  clearError();

  const emailEl    = document.getElementById("email");
  const passwordEl = document.getElementById("password");

  const ok1 = validateField(emailEl,    { required: true, email: true });
  const ok2 = validateField(passwordEl, { required: true });
  if (!ok1 || !ok2) return;

  submitBtn.disabled = true;
  submitBtn.textContent = "Connexion en cours…";

  const { user, error } = await loginUser(emailEl.value.trim(), passwordEl.value);

  if (error) {
    showError(error);
    submitBtn.disabled = false;
    submitBtn.textContent = "Se connecter";
    return;
  }

  const profile = await getUserProfile(user.uid);
  showToast("Connexion réussie !");
  setTimeout(() => window.location.href = "dashboard-utilisateur.html", 700);
});
</script>
</body>
</html>
